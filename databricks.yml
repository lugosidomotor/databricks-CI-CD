bundle:
  name: dbx-cicd-sample
  databricks_cli_version: ">=0.275.0"

include:
  - resources/*.yml

artifacts:
  default:
    type: whl
    path: .
    build: uv build --wheel

variables:
  catalog:
    description: Existing Unity Catalog catalog where the sample schemas are created.
    default: main
  schema:
    description: Target schema for the wheel-based medallion job.
    default: dbx_cicd_dev
  pipeline_schema:
    description: Target schema managed by the declarative pipeline.
    default: dbx_cicd_pipeline_dev
  secret_scope:
    description: Secret scope used by the manually triggered secret example.
    default: dbx-cicd-sample
  secret_key:
    description: Secret key used by the manually triggered secret example.
    default: sample-secret
  service_principal_id:
    description: Application ID of the staging/prod run identity; override the sentinel value.
    default: REQUIRED_FOR_STAGING_AND_PROD

targets:
  dev:
    default: true
    mode: development
    variables:
      schema: dbx_cicd_${workspace.current_user.short_name}
      pipeline_schema: dbx_cicd_pipeline_${workspace.current_user.short_name}
    presets:
      tags:
        environment: dev
        managed_by: bundle

  staging:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.service_principal_id}
    variables:
      schema: dbx_cicd_staging
      pipeline_schema: dbx_cicd_pipeline_staging
    presets:
      name_prefix: "[staging] "
      tags:
        environment: staging
        managed_by: bundle

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.service_principal_id}
    variables:
      schema: dbx_cicd_prod
      pipeline_schema: dbx_cicd_pipeline_prod
    presets:
      name_prefix: "[prod] "
      tags:
        environment: prod
        managed_by: bundle
    resources:
      jobs:
        medallion_job:
          schedule:
            pause_status: UNPAUSED
