resources:
  jobs:
    report_job:
      name: dbx-cicd-sample-report
      description: Separate manually triggered job for viewing the Gold result.
      max_concurrent_runs: 1
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: run_id
          default: "{{job.run_id}}"
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: show_report
          environment_key: default
          python_wheel_task:
            package_name: dbx_cicd_sample
            entry_point: report
            parameters:
              - --catalog
              - "{{job.parameters.catalog}}"
              - --schema
              - "{{job.parameters.schema}}"
              - --run-id
              - "{{job.parameters.run_id}}"
