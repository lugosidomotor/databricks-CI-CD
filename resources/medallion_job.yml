resources:
  jobs:
    medallion_job:
      name: dbx-cicd-sample-medallion
      description: Bronze -> Silver -> Gold -> quality using one shared serverless environment.
      max_concurrent_runs: 1
      tags:
        layer: medallion
        sample: "true"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: run_id
          default: "{{job.run_id}}"
      schedule:
        quartz_cron_expression: 0 0 6 * * ?
        timezone_id: Europe/Budapest
        pause_status: PAUSED
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: bronze
          description: Load deterministic sample orders into a Delta table.
          environment_key: default
          python_wheel_task:
            package_name: dbx_cicd_sample
            entry_point: bronze
            parameters: &task_parameters
              - --catalog
              - "{{job.parameters.catalog}}"
              - --schema
              - "{{job.parameters.schema}}"
              - --run-id
              - "{{job.parameters.run_id}}"
          max_retries: 1
          min_retry_interval_millis: 10000

        - task_key: silver
          description: Apply type conversion, validation, and deduplication.
          depends_on:
            - task_key: bronze
          environment_key: default
          python_wheel_task:
            package_name: dbx_cicd_sample
            entry_point: silver
            parameters: *task_parameters
          max_retries: 1
          min_retry_interval_millis: 10000

        - task_key: gold
          description: Build daily business aggregates by country.
          depends_on:
            - task_key: silver
          environment_key: default
          python_wheel_task:
            package_name: dbx_cicd_sample
            entry_point: gold
            parameters: *task_parameters
          max_retries: 1
          min_retry_interval_millis: 10000

        - task_key: quality
          description: Run a fail-fast data quality gate after the Gold task.
          depends_on:
            - task_key: gold
          environment_key: default
          python_wheel_task:
            package_name: dbx_cicd_sample
            entry_point: quality
            parameters: *task_parameters
