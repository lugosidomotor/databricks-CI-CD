resources:
  jobs:
    secret_example_job:
      name: dbx-cicd-sample-secret-example
      description: Kézzel indítható példa; titkot olvas, de az értékét soha nem naplózza.
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: secret_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*, 2]
            custom_tags:
              ResourceClass: SingleNode
              project: dbx-cicd-sample
      tasks:
        - task_key: read_secret_safely
          job_cluster_key: secret_cluster
          python_wheel_task:
            package_name: dbx_cicd_sample
            entry_point: secret-example
            parameters:
              - --scope
              - ${var.secret_scope}
              - --key
              - ${var.secret_key}
          libraries:
            - whl: ../dist/*.whl

