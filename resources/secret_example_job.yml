resources:
  jobs:
    secret_example_job:
      name: dbx-cicd-sample-secret-example
      description: Manual example that reads a secret without logging its value.
      max_concurrent_runs: 1
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: read_secret_safely
          environment_key: default
          python_wheel_task:
            package_name: dbx_cicd_sample
            entry_point: secret-example
            parameters:
              - --scope
              - ${var.secret_scope}
              - --key
              - ${var.secret_key}
